name: Daily Data Cleanup

permissions:
  contents: write


on:
  schedule:
    # 매일 한국 시간 오전 7시 (UTC 22:00)에 실행
    - cron: '0 22 * * *'
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Cleanup Script
        run: node scripts/cleanup.js

      - name: Run Fetch Public Data Script (AI 연동)
        env:
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$PUBLIC_DATA_API_KEY" ]; then
            echo "API 키가 설정되지 않아 데이터 수집을 건너뜁니다."
          else
            node scripts/fetch-public-data.js
          fi

      - name: Run Generate Posts JSON
        run: node scripts/generate-posts-json.js

      - name: Run Build Search Index
        run: node scripts/build-search-index.js

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore: daily data update [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
