name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 22 * * *' # 매일 아침 한국시간 7시 (UTC 22시)
  workflow_dispatch: # 수동 실행

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run data fetch script
        if: github.event_name != 'push'
        run: |
          echo "🔍 공공데이터 수집을 시작합니다..."
          node scripts/fetch-public-data.js
        env:
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Generate blog post
        if: github.event_name != 'push'
        run: |
          echo "📝 블로그 포스팅 생성을 시작합니다..."
          node scripts/generate-blog-post.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and push changes
        if: github.event_name != 'push'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            echo "📤 변경된 데이터를 반영합니다..."
            git commit -m "자동 업데이트: 공공데이터 수집 및 블로그 글 생성"
            git pull --rebase origin main &&
            git push
          else
            echo "✅ 새로 추가된 데이터가 없습니다."
          fi

      - name: Build
        run: |
          echo "🏗️ 프로젝트 빌드 중..."
          npm run build
        env:
          NEXT_PUBLIC_ADSENSE_ID: "ca-pub-2764192052550924"

      - name: Deploy
        run: |
          echo "🚀 Cloudflare Pages에 배포합니다..."
          npx wrangler pages deploy out --project-name=my-local-info --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
